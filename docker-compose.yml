services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: concall
      POSTGRES_PASSWORD: concall
      POSTGRES_DB: concall
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U concall"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://concall:concall@db:5432/concall
      LLM_PROVIDER: stub
      EXTRACTION_PROVIDER: pdfplumber
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  pgdata:
